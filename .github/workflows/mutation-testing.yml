name: mutation testing

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - test/**

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch all commits, used by sbt-dynver plugin to determine version
          fetch-depth: 0
      - uses: ./.github/setup
      - name: Run Stryker4s
        run: sbt 'core/stryker --reporters console --reporters dashboard'
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

  command-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch all commits, used by sbt-dynver plugin to determine version
          fetch-depth: 0
      - uses: ./.github/setup
      - name: Run Stryker4s
        run: sbt 'commandRunner/stryker --reporters console --reporters dashboard'
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

  mill-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch all commits, used by sbt-dynver plugin to determine version
          fetch-depth: 0
      - uses: ./.github/setup
      - name: Run Stryker4s
        run: sbt 'millPlugin/stryker --reporters console --reporters dashboard'
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

  maven-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch all commits, used by sbt-dynver plugin to determine version
          fetch-depth: 0
      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1
      - uses: ./.github/setup
        with:
          cache: 'maven'
      - name: Publish Stryker4s maven deps locally
        run: sbt 'publishM2Local'
      - name: Run Stryker4s
        run: |
          cd maven
          mvn -B --no-transfer-progress stryker4s:run
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
